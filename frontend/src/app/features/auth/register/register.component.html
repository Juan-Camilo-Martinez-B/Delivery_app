<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <h1>Crear Cuenta</h1>
      <p>Únete a la mejor plataforma de delivery</p>
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="register-form">
      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre Completo</label>
          <input type="text" id="nombre" name="nombre" [(ngModel)]="user.nombre" required class="form-input">
        </div>
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" name="email" [(ngModel)]="user.email" required class="form-input">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" [(ngModel)]="user.password" required minlength="6" class="form-input">
        </div>
        <div class="form-group">
          <label for="telefono">Teléfono</label>
          <input type="text" id="telefono" name="telefono" [(ngModel)]="user.telefono" class="form-input">
        </div>
      </div>

      <div class="form-group">
        <label for="direccion">Dirección de Entrega</label>
        <input type="text" id="direccion" name="direccion" [(ngModel)]="user.direccion" class="form-input">
      </div>

      <div class="form-group">
        <label for="rol">Tipo de Usuario</label>
        <select id="rol" name="rol" [(ngModel)]="user.rol" class="form-input">
          <option value="CLIENTE">Cliente</option>
          <option value="REPARTIDOR">Repartidor</option>
          <option value="TIENDA">Tienda</option>
        </select>
      </div>

      <div *ngIf="errorMessage()" class="error-message">
        {{ errorMessage() }}
      </div>

      <button type="submit" [disabled]="!registerForm.form.valid || isLoading()" class="register-button">
        <span *ngIf="!isLoading()">Registrarse</span>
        <span *ngIf="isLoading()" class="loader"></span>
      </button>
    </form>

    <div class="register-footer">
      <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia Sesión</a></p>
    </div>
  </div>
</div>
